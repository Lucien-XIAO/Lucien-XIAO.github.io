<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
</head>
<body class="theme-claude">
  {% include math_float.html %}
  {% include nav.html %}
  <div class="page-wrapper">
    <main class="page-main">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.section').forEach((el) => el.classList.add('visible'));
    });
    const toggle = document.getElementById('themeToggle');
    if (toggle) {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        toggle.querySelector('i').className = saved === 'dark'
          ? 'fa-solid fa-sun'
          : 'fa-solid fa-moon';
      }
      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.querySelector('i').className = next === 'dark'
          ? 'fa-solid fa-sun'
          : 'fa-solid fa-moon';
      });
    }
  </script>
</body>
</html>

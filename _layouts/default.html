<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
</head>
<body class="theme-claude">
  {% include math_float.html %}
  {% include nav.html %}
  <div class="wrapper">
    {% include sidebar.html %}
    <section class="content">
      {{ content }}
    </section>
    {% include footer.html %}
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.nav-active')?.scrollIntoView({ block: 'nearest', inline: 'center' });

      const decodeContact = (value) => value
        .split('-')
        .map((code) => String.fromCharCode(Number(code) - 7))
        .join('');

      document.querySelectorAll('.js-email-link[data-contact-code]').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();

          const email = decodeContact(link.dataset.contactCode || '');
          const targetSelector = link.dataset.emailTarget;
          const target = targetSelector ? document.querySelector(targetSelector) : null;
          if (target) target.textContent = email;

          window.location.href = `mai${'lto'}:${email}`;
        });
      });

      document.querySelectorAll('.section').forEach((el, index) => {
        el.classList.add('visible');
        el.style.transitionDelay = `${Math.min(index * 35, 180)}ms`;

        const title = el.querySelector('.section-title');
        const body = el.querySelector('.section-body');
        if (!title || !body) return;

        const sectionId = el.id || `section-${index + 1}`;
        if (!el.id) el.id = sectionId;
        if (!body.id) body.id = `${sectionId}-body`;

        el.classList.add('is-collapsible');
        title.setAttribute('role', 'button');
        title.setAttribute('tabindex', '0');
        title.setAttribute('aria-controls', body.id);
        title.setAttribute('aria-expanded', 'true');

        const openSection = () => {
          el.classList.remove('is-collapsed');
          title.setAttribute('aria-expanded', 'true');
          body.style.height = '0px';
          body.offsetHeight;
          body.style.height = `${body.scrollHeight}px`;
        };

        const closeSection = () => {
          title.setAttribute('aria-expanded', 'false');
          body.style.height = `${body.scrollHeight}px`;
          body.offsetHeight;
          el.classList.add('is-collapsed');
          body.style.height = '0px';
        };

        const toggleSection = () => {
          if (el.classList.contains('is-collapsed')) {
            openSection();
          } else {
            closeSection();
          }
        };

        body.addEventListener('transitionend', (event) => {
          if (event.target === body && event.propertyName === 'height' && !el.classList.contains('is-collapsed')) {
            body.style.height = 'auto';
          }
        });

        title.addEventListener('click', toggleSection);
        title.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggleSection();
          }
        });
      });
    });
    
    const toggle = document.getElementById('themeToggle');
    if (toggle) {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        toggle.innerHTML = saved === 'dark'
          ? '<i class="fa-solid fa-sun"></i>'
          : '<i class="fa-solid fa-moon"></i>';
      }
      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.innerHTML = next === 'dark'
          ? '<i class="fa-solid fa-sun"></i>'
          : '<i class="fa-solid fa-moon"></i>';
      });
    }
  </script>
</body>
</html>

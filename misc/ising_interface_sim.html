<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ising Random Interface</title>
  <style>
    :root {
      --bg: #fff;
      --panel: #f8f6f3;
      --ink: #302d22;
      --muted: #7f7668;
      --accent: #c2714f;
      --accent-soft: rgba(194, 113, 79, 0.12);
      --border: rgba(194, 113, 79, 0.22);
      --teal: #2f6f68;
      --plus: #c8443c;
      --minus: #315da8;
      --interface: #ffd54f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 12px;
    }

    .sim-shell {
      max-width: 820px;
      width: 100%;
    }

    .controls {
      align-items: end;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(180px, 1.3fr) minmax(108px, 0.75fr) minmax(130px, 0.9fr) auto auto auto;
      padding: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .input-row {
      align-items: center;
      display: flex;
      gap: 8px;
    }

    label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="range"] {
      accent-color: var(--accent);
      min-width: 0;
      width: 100%;
    }

    input[type="number"],
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink);
      font-size: 13px;
      height: 34px;
      padding: 0 8px;
      width: 76px;
    }

    select {
      width: 100%;
    }

    button {
      align-items: center;
      background: rgba(194, 113, 79, 0.08);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      font-size: 13px;
      font-weight: 700;
      height: 34px;
      justify-content: center;
      padding: 0 12px;
      transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    button:hover {
      background: var(--accent-soft);
      border-color: rgba(194, 113, 79, 0.42);
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: #ae6345;
    }

    .stats {
      align-items: center;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      gap: 8px 14px;
      justify-content: center;
      min-height: 24px;
      padding: 9px 0 7px;
    }

    .stats strong {
      color: var(--teal);
      font-weight: 800;
    }

    .canvas-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(61, 57, 41, 0.06);
      margin: 0 auto;
      overflow: hidden;
      padding: 10px;
      width: min(100%, 600px);
    }

    canvas {
      display: block;
      height: auto;
      image-rendering: pixelated;
      width: 100%;
    }

    .legend {
      align-items: center;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      font-size: 12px;
      gap: 10px 14px;
      justify-content: center;
      margin-top: 8px;
    }

    .legend span {
      align-items: center;
      display: inline-flex;
      gap: 6px;
    }

    .swatch {
      border-radius: 3px;
      display: inline-block;
      height: 10px;
      width: 18px;
    }

    .swatch.plus { background: var(--plus); }
    .swatch.minus { background: var(--minus); }
    .swatch.interface { background: var(--interface); }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      button {
        width: 100%;
      }
    }

    @media (max-width: 460px) {
      body {
        padding: 8px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .canvas-wrap {
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="sim-shell">
    <section class="controls" aria-label="Ising interface controls">
      <div class="input-group">
        <label for="temperature">Temperature T</label>
        <div class="input-row">
          <input id="temperature" type="range" min="1.00" max="4.00" step="0.01" value="1.54">
          <input id="temperatureValue" type="number" min="1.00" max="4.00" step="0.01" value="1.54">
        </div>
      </div>

      <div class="input-group">
        <label for="size">Box size L</label>
        <select id="size">
          <option value="48">48</option>
          <option value="64">64</option>
          <option value="80" selected>80</option>
          <option value="96">96</option>
          <option value="128">128</option>
        </select>
      </div>

      <div class="input-group">
        <label for="speed">Sweeps / frame</label>
        <input id="speed" type="range" min="1" max="24" step="1" value="6">
      </div>

      <button class="primary" id="toggle">Pause</button>
      <button id="reset">Reset</button>
      <button id="thermalize">Thermalize</button>
    </section>

    <div class="stats" id="stats"></div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="650" height="650" aria-label="Ising random interface simulation"></canvas>
    </div>

    <div class="legend">
      <span><i class="swatch plus"></i>+ phase</span>
      <span><i class="swatch minus"></i>- phase</span>
      <span><i class="swatch interface"></i>estimated interface</span>
    </div>
  </main>

  <script>
    const BETA_CRITICAL = 0.5 * Math.log(1 + Math.sqrt(2));
    const TEMPERATURE_CRITICAL = 1 / BETA_CRITICAL;
    const COLORS = {
      plus: [200, 68, 60, 255],
      minus: [49, 93, 168, 255],
    };

    class IsingInterfaceModel {
      constructor(L, temperature) {
        this.L = L;
        this.temperature = temperature;
        this.beta = 1 / temperature;
        this.spins = new Int8Array(L * L);
        this.fixed = new Uint8Array(L * L);
        this.sweepCount = 0;
        this.initialize();
      }

      index(row, col) {
        return row * this.L + col;
      }

      boundaryValue(row) {
        return row < this.L / 2 ? 1 : -1;
      }

      initialize() {
        const wiggle = Math.max(2, Math.floor(this.L / 14));

        for (let row = 0; row < this.L; row += 1) {
          const value = this.boundaryValue(row);
          for (let col = 0; col < this.L; col += 1) {
            this.spins[this.index(row, col)] = value;
          }
        }

        for (let col = 1; col < this.L - 1; col += 1) {
          const height = clamp(
            Math.floor(this.L / 2 + randomInteger(-wiggle, wiggle)),
            1,
            this.L - 1
          );
          for (let row = 1; row < this.L - 1; row += 1) {
            this.spins[this.index(row, col)] = row < height ? 1 : -1;
          }
        }

        for (let row = 0; row < this.L; row += 1) {
          for (let col = 0; col < this.L; col += 1) {
            const boundary = row === 0 || row === this.L - 1 || col === 0 || col === this.L - 1;
            if (boundary) {
              this.fixed[this.index(row, col)] = 1;
              this.spins[this.index(row, col)] = this.boundaryValue(row);
            }
          }
        }
      }

      setTemperature(temperature) {
        this.temperature = temperature;
        this.beta = 1 / temperature;
      }

      sweep() {
        const accept4 = Math.exp(-4 * this.beta);
        const accept8 = Math.exp(-8 * this.beta);

        for (let parity = 0; parity < 2; parity += 1) {
          for (let row = 1; row < this.L - 1; row += 1) {
            for (let col = 1; col < this.L - 1; col += 1) {
              if (((row + col) & 1) !== parity) continue;

              const idx = this.index(row, col);
              const spin = this.spins[idx];
              const neighborSum =
                this.spins[idx - this.L] +
                this.spins[idx + this.L] +
                this.spins[idx - 1] +
                this.spins[idx + 1];
              const deltaEnergy = 2 * spin * neighborSum;

              if (deltaEnergy <= 0) {
                this.spins[idx] = -spin;
              } else if (deltaEnergy === 4 && Math.random() < accept4) {
                this.spins[idx] = -spin;
              } else if (deltaEnergy === 8 && Math.random() < accept8) {
                this.spins[idx] = -spin;
              }
            }
          }
        }

        this.sweepCount += 1;
      }

      run(sweeps) {
        for (let i = 0; i < sweeps; i += 1) {
          this.sweep();
        }
      }

      interfaceHeight() {
        const heights = new Float32Array(this.L);

        for (let col = 0; col < this.L; col += 1) {
          let cumulative = 0;
          let best = -Infinity;
          let bestRow = 0;

          for (let row = 0; row < this.L; row += 1) {
            cumulative += this.spins[this.index(row, col)];
            if (cumulative > best) {
              best = cumulative;
              bestRow = row;
            }
          }

          heights[col] = bestRow;
        }

        return heights;
      }

      roughness(heights) {
        let sum = 0;
        let count = 0;

        for (let col = 1; col < this.L - 1; col += 1) {
          sum += heights[col];
          count += 1;
        }

        const mean = sum / count;
        let variance = 0;

        for (let col = 1; col < this.L - 1; col += 1) {
          const centered = heights[col] - mean;
          variance += centered * centered;
        }

        return Math.sqrt(variance / count);
      }

      magnetization() {
        let sum = 0;
        for (let i = 0; i < this.spins.length; i += 1) {
          sum += this.spins[i];
        }
        return sum / this.spins.length;
      }
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");
    const temperature = document.getElementById("temperature");
    const temperatureValue = document.getElementById("temperatureValue");
    const sizeSelect = document.getElementById("size");
    const speed = document.getElementById("speed");
    const toggle = document.getElementById("toggle");
    const reset = document.getElementById("reset");
    const thermalize = document.getElementById("thermalize");
    const stats = document.getElementById("stats");

    let model = new IsingInterfaceModel(Number(sizeSelect.value), Number(temperature.value));
    let running = true;
    let imageData = null;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function syncTemperature(value) {
      const next = clamp(Number(value) || 1.54, Number(temperature.min), Number(temperature.max));
      temperature.value = next.toFixed(2);
      temperatureValue.value = next.toFixed(2);
      model.setTemperature(next);
      draw();
    }

    function rebuildModel() {
      model = new IsingInterfaceModel(Number(sizeSelect.value), Number(temperature.value));
      imageData = null;
      draw();
    }

    function setupCanvas() {
      const cssSize = Math.min(560, Math.max(280, canvas.parentElement.clientWidth - 20));
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = `${cssSize}px`;
      canvas.style.height = `${cssSize}px`;
      canvas.width = Math.round(cssSize * dpr);
      canvas.height = Math.round(cssSize * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }

    function ensureImageData() {
      if (tempCanvas.width !== model.L || tempCanvas.height !== model.L) {
        tempCanvas.width = model.L;
        tempCanvas.height = model.L;
        imageData = tempCtx.createImageData(model.L, model.L);
      }
      if (!imageData) {
        imageData = tempCtx.createImageData(model.L, model.L);
      }
    }

    function drawSpins() {
      ensureImageData();
      const data = imageData.data;

      for (let i = 0; i < model.spins.length; i += 1) {
        const color = model.spins[i] === 1 ? COLORS.plus : COLORS.minus;
        const offset = i * 4;
        data[offset] = color[0];
        data[offset + 1] = color[1];
        data[offset + 2] = color[2];
        data[offset + 3] = color[3];
      }

      tempCtx.putImageData(imageData, 0, 0);
    }

    function draw() {
      setupCanvas();
      drawSpins();

      const cssSize = Number.parseFloat(canvas.style.width);
      const pad = 44;
      const board = cssSize - pad * 2;
      const heights = model.interfaceHeight();
      const roughness = model.roughness(heights);
      const phaseText = model.temperature < TEMPERATURE_CRITICAL ? "low T, phase separated" : "high T, disordered";

      ctx.clearRect(0, 0, cssSize, cssSize);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, cssSize, cssSize);
      ctx.drawImage(tempCanvas, pad, pad, board, board);

      ctx.strokeStyle = "rgba(48, 45, 34, 0.32)";
      ctx.lineWidth = 1;
      ctx.strokeRect(pad + 0.5, pad + 0.5, board - 1, board - 1);

      drawBoundaryConditions(pad, board, cssSize);

      if (model.L <= 80) {
        ctx.strokeStyle = "rgba(255,255,255,0.13)";
        ctx.lineWidth = 0.5;
        const cell = board / model.L;
        ctx.beginPath();
        for (let i = 1; i < model.L; i += 1) {
          const pos = pad + i * cell;
          ctx.moveTo(pos, pad);
          ctx.lineTo(pos, pad + board);
          ctx.moveTo(pad, pos);
          ctx.lineTo(pad + board, pos);
        }
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255, 213, 79, 0.96)";
      ctx.lineWidth = Math.max(2, board / 180);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (let col = 0; col < model.L; col += 1) {
        const x = pad + (col + 0.5) * board / model.L;
        const y = pad + (heights[col] + 0.5) * board / model.L;
        if (col === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      ctx.fillStyle = "rgba(48, 45, 34, 0.76)";
      ctx.font = "12px SFMono-Regular, Consolas, monospace";
      ctx.fillText(`T=${model.temperature.toFixed(2)}, beta=${model.beta.toFixed(3)}`, pad, cssSize - 15);

      stats.innerHTML = [
        `T=<strong>${model.temperature.toFixed(2)}</strong>`,
        `&beta;=<strong>${model.beta.toFixed(3)}</strong>`,
        `T_c=<strong>${TEMPERATURE_CRITICAL.toFixed(3)}</strong>`,
        `sweeps=<strong>${model.sweepCount}</strong>`,
        `W=<strong>${roughness.toFixed(2)}</strong>`,
        phaseText,
      ].join("<span>|</span>");
    }

    function drawBoundaryConditions(pad, board, cssSize) {
      const mid = pad + board / 2;
      const sideXLeft = pad - 12;
      const sideXRight = pad + board + 12;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineWidth = 5;

      ctx.strokeStyle = "rgba(200, 68, 60, 0.9)";
      ctx.beginPath();
      ctx.moveTo(sideXLeft, pad);
      ctx.lineTo(sideXLeft, mid);
      ctx.moveTo(sideXRight, pad);
      ctx.lineTo(sideXRight, mid);
      ctx.stroke();

      ctx.strokeStyle = "rgba(49, 93, 168, 0.9)";
      ctx.beginPath();
      ctx.moveTo(sideXLeft, mid);
      ctx.lineTo(sideXLeft, pad + board);
      ctx.moveTo(sideXRight, mid);
      ctx.lineTo(sideXRight, pad + board);
      ctx.stroke();

      ctx.font = "700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillStyle = "rgba(200, 68, 60, 0.95)";
      ctx.fillText("+ boundary", pad + board / 2, 18);

      ctx.fillStyle = "rgba(49, 93, 168, 0.95)";
      ctx.fillText("- boundary", pad + board / 2, cssSize - 28);

      ctx.translate(17, pad + board / 4);
      ctx.rotate(-Math.PI / 2);
      ctx.fillStyle = "rgba(200, 68, 60, 0.9)";
      ctx.fillText("+ fixed", 0, 0);
      ctx.restore();

      ctx.save();
      ctx.translate(17, pad + (3 * board) / 4);
      ctx.rotate(-Math.PI / 2);
      ctx.fillStyle = "rgba(49, 93, 168, 0.9)";
      ctx.font = "700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("- fixed", 0, 0);
      ctx.restore();
    }

    function tick() {
      if (running) {
        model.run(Number(speed.value));
        draw();
      }
      window.requestAnimationFrame(tick);
    }

    temperature.addEventListener("input", (event) => syncTemperature(event.target.value));
    temperatureValue.addEventListener("change", (event) => syncTemperature(event.target.value));
    sizeSelect.addEventListener("change", rebuildModel);

    toggle.addEventListener("click", () => {
      running = !running;
      toggle.textContent = running ? "Pause" : "Run";
      toggle.classList.toggle("primary", running);
    });

    reset.addEventListener("click", rebuildModel);

    thermalize.addEventListener("click", () => {
      const previous = running;
      running = false;
      toggle.textContent = "Run";
      toggle.classList.remove("primary");
      setTimeout(() => {
        model.run(700);
        draw();
        running = previous;
        toggle.textContent = running ? "Pause" : "Run";
        toggle.classList.toggle("primary", running);
      }, 20);
    });

    window.addEventListener("resize", draw);

    setupCanvas();
    model.run(250);
    draw();
    tick();
  </script>
</body>
</html>

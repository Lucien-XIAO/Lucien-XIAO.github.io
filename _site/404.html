  <div class="math-float-canvas" id="math-float-canvas"></div>
<script>
  (function() {
    const symbols = [
      // Basic Math & Greek Letters
      '∫', '∑', '∞', '∂', 'ℙ', '𝔼', '∇', 'Δ', 'θ', 'λ', 'μ', 'σ',
      'α', 'β', 'γ', 'ξ', 'π', 'ρ', 'τ', 'φ', 'ω', 'Ω', 'ℱ', '∩', '∪',
      // Probability & Stochastic Processes
      'ℙ(X=x)', '𝔼[X]', 'dμ(x)', 'B<sub>t</sub>', 'W<sub>t</sub>', 'd X<sub>t</sub> = μ dt + σ d W<sub>t</sub>',
      'Var(X) = 𝔼[(X-μ)<sup>2</sup>]', 'Cov(X,Y) = 𝔼[XY] - 𝔼[X]𝔼[Y]',
      'X<sub>n</sub> → N(0, σ<sup>2</sup>)', 'ℙ(A|B) = ℙ(B|A)ℙ(A)/ℙ(B)',
      'φ<sub>X</sub>(t) = 𝔼[e<sup>itX</sup>]', 'H(X) = -∑ p(x)log p(x)',
      // Statistical Mechanics & Ising Model
      'ℋ = -J∑σ<sub>i</sub>σ<sub>j</sub>', 'Z = ∑ e<sup>-βℋ</sup>', 'σ<sub>i</sub> ∈ {±1}',
      'm = tanh(βJm + h)', 'F = -kT ln Z', '⟨σ<sub>i</sub>σ<sub>j</sub>⟩ ∼ e<sup>-r/ξ</sup>',
      'S = k<sub>B</sub> ln Ω', 'T<sub>c</sub> = 2J / k<sub>B</sub> ln(1+√2)'
    ];
    const canvas = document.getElementById('math-float-canvas');
    if (!canvas) return;

    const numSymbols = 26; // number of symbols to show

    for (let i = 0; i < numSymbols; i++) {
      // Distribute evenly across the screen width (0 to 100vw)
      const baseLeft = (i / numSymbols) * 100; 
      createSymbol(baseLeft);
    }

    function createSymbol(baseLeft) {
      const span = document.createElement('span');
      span.className = 'math-sym';
      span.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
      
      // Randomize starting properties
      // Add a tiny jitter around the base lane so it looks natural, but stays in its lane
      const jitter = (Math.random() - 0.5) * 3; 
      const startLeft = Math.max(2, Math.min(98, baseLeft + jitter)); 
      
      const startBottom = -(Math.random() * 20 + 5); // Start slightly below screen
      const delay = Math.random() * 5; // animation delay
      const duration = Math.random() * 8 + 8; // 8 to 16s duration
      const fontSize = Math.random() * 24 + 20; // 20px to 44px
      const opacity = Math.random() * 0.12 + 0.10; // 0.10 to 0.22 max opacity
      const rotation = (Math.random() - 0.5) * 60; // -30 to 30 deg rotation
      const scale = Math.random() * 0.5 + 0.8; // 0.8 to 1.3

      span.style.left = startLeft + 'vw';
      span.style.bottom = startBottom + 'vh';
      span.style.fontSize = fontSize + 'px';
      span.style.animationDuration = duration + 's';
      span.style.animationDelay = delay + 's';
      
      // Pass custom properties to CSS animation
      span.style.setProperty('--sym-opacity', opacity);
      span.style.setProperty('--sym-rot', rotation + 'deg');
      span.style.setProperty('--sym-scale', scale);

      canvas.appendChild(span);

      // Recreate symbol after animation ends to keep it going forever
      span.addEventListener('animationend', () => {
        span.remove();
        // Respawn in the same horizontal lane to avoid dense cluster overlap
        createSymbol(baseLeft);
      });
    }
  })();
</script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.section').forEach((el) => el.classList.add('visible'));
    });
    const toggle = document.getElementById('themeToggle');
    if (toggle) {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        toggle.querySelector('i').className = saved === 'dark'
          ? 'fa-solid fa-sun'
          : 'fa-solid fa-moon';
      }
      toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        toggle.querySelector('i').className = next === 'dark'
          ? 'fa-solid fa-sun'
          : 'fa-solid fa-moon';
      });
    }
  </script>
